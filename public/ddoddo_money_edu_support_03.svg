<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(880 150) rotate(140) scale(640 540)">
      <stop stop-color="#F5D2BF"/>
      <stop offset="1" stop-color="#FAF6F0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(170 930) rotate(20) scale(520 460)">
      <stop stop-color="#E7E3D5"/>
      <stop offset="1" stop-color="#FAF6F0" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain3" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1080" height="1080" fill="#FAF6F0"/>
  <rect width="1080" height="1080" fill="url(#g1)"/>
  <rect width="1080" height="1080" fill="url(#g2)"/>
  <rect width="1080" height="1080" filter="url(#grain3)" opacity="0.3"/>

  <text x="540" y="170" text-anchor="middle" fill="#6B6661" font-size="34" font-family="Apple SD Gothic Neo, Pretendard, sans-serif" letter-spacing="3">ddoddo_money</text>

