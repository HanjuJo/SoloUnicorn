  <text x="540" y="425" text-anchor="middle" fill="#1F2731" font-size="94" font-weight="700" font-family="Apple SD Gothic Neo, Pretendard, serif">대상 여부부터</text>
  <text x="540" y="520" text-anchor="middle" fill="#1F2731" font-size="94" font-weight="700" font-family="Apple SD Gothic Neo, Pretendard, serif">확인해보세요</text>

  <line x1="230" y1="620" x2="850" y2="620" stroke="#D9D1C5" stroke-width="2"/>

